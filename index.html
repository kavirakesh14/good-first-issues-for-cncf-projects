<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCF Good First Issues Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --graduated: #238636;
            --incubating: #8957e5;
            --sandbox: #6e7681;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .header p { color: var(--text-muted); }
        
        .layout {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            gap: 2rem;
        }
        
        /* Sidebar (Projects) */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }
        .sidebar h3 { margin-top: 0; font-size: 1.1rem; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        
        .project-list-container {
            max-height: 800px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        /* Custom scrollbar for sidebar */
        .project-list-container::-webkit-scrollbar { width: 6px; }
        .project-list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        .project-list { list-style: none; padding: 0; margin: 0; }
        .project-list li {
            padding: 0.75rem 1rem;
            margin-bottom: 0.25rem;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: background 0.2s;
            word-break: break-all;
        }
        .project-list li:hover { background-color: var(--border); }
        .project-list li.active { background-color: var(--accent); color: #fff; font-weight: bold; }

        /* Main Content */
        .main-content { flex-grow: 1; min-width: 0; }
        
        /* Filter Controls */
        .controls-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .search-bar {
            width: 100%;
            margin-bottom: 1rem;
        }
        .search-bar input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--accent); }
        
        .dropdown-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .dropdown-filters select {
            flex: 1;
            min-width: 150px;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.6rem;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        /* Issue Cards */
        .issue-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s ease;
        }
        .issue-card:hover { border-color: var(--accent); }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .repo-name { font-size: 0.9rem; color: var(--text-muted); font-family: monospace;}
        .date-posted { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
        
        .issue-title { font-size: 1.25rem; font-weight: 600; margin: 0 0 1rem 0; line-height: 1.3;}
        .issue-title a { color: var(--accent); text-decoration: none; }
        .issue-title a:hover { text-decoration: underline; }
        
        /* Tags */
        .tags-container { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;}
        .tag { color: #ffffff; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 2em; font-weight: 500; }
        .tag.issue-label { background-color: var(--border); }
        .tag.graduated { background-color: var(--graduated); }
        .tag.incubating { background-color: var(--incubating); }
        .tag.sandbox { background-color: var(--sandbox); }
        .tag.lang { background-color: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); }
        
        .stats-bar {
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @media (max-width: 850px) {
            .layout { flex-direction: column; gap: 1rem; }
            .sidebar { width: 100%; }

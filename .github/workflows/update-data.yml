name: Auto-Sync CNCF Good First Issues

on:
  schedule:
    # Runs every 6 hours (At minute 0 of every 6th hour)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger the pipeline anytime from the GitHub UI

# Explicitly grant write access so the runner can push data.json back to the repo
permissions:
  contents: write

jobs:
  sync-ecosystem:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.10'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Auto-Discovery Engine
        # This injects the token cleanly into the step's runtime environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python fetcher.py

      - name: Commit and Push Updated Data Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only stage, commit, and push if data.json actually changed
          git add data.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: automated sync of CNCF issue database [skip ci]"
            git push origin main
          else
            echo "No database changes detected during this synchronization window."
          fi
